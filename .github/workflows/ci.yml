name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  deploy-pages:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
      - run: npm ci
      - name: Build web bundles
        run: npm run build:pages -w @wms-js/web
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/web/public

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: |
          npm run build -w @wms-js/lib
          npm run build -w @wms-js/cli
          npm run build -w @wms-js/mqtt-bridge
      - name: Prepare dist for publish
        run: |
          # @wms-js/lib — library with exports/types
          node -e "
            const pkg = require('./packages/lib/package.json');
            pkg.main = 'index.js';
            pkg.types = 'index.d.ts';
            pkg.exports = {
              '.': { types: './index.d.ts', import: './index.js' },
              './*': { types: './*.d.ts', import: './*.js' }
            };
            delete pkg.scripts;
            delete pkg.devDependencies;
            delete pkg.publishConfig;
            delete pkg.files;
            require('fs').writeFileSync('./packages/lib/dist/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cp packages/lib/README.md packages/lib/dist/
          cp packages/lib/LICENSE packages/lib/dist/

          # @wms-js/cli — CLI tool, bin only
          node -e "
            const libVer = require('./packages/lib/package.json').version;
            const pkg = require('./packages/cli/package.json');
            pkg.bin = { 'wms-js': './index.js' };
            pkg.dependencies['@wms-js/lib'] = libVer;
            delete pkg.scripts;
            delete pkg.devDependencies;
            delete pkg.publishConfig;
            delete pkg.files;
            require('fs').writeFileSync('./packages/cli/dist/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # @wms-js/mqtt-bridge — CLI tool, bin only
          node -e "
            const libVer = require('./packages/lib/package.json').version;
            const pkg = require('./packages/mqtt-bridge/package.json');
            pkg.bin = { 'wms-js-mqtt-bridge': './index.js' };
            pkg.dependencies['@wms-js/lib'] = libVer;
            delete pkg.scripts;
            delete pkg.devDependencies;
            delete pkg.publishConfig;
            delete pkg.files;
            require('fs').writeFileSync('./packages/mqtt-bridge/dist/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - run: npm publish packages/lib/dist --access public
      - run: npm publish packages/cli/dist --access public
      - run: npm publish packages/mqtt-bridge/dist --access public
