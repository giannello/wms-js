services:
  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"

  mqtt-bridge:
    build:
      context: .
      target: dev
    command: npx tsx watch packages/mqtt-bridge/src/index.ts
    volumes:
      - /dev:/dev
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - mosquitto
    environment:
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - WMS_PORT=/dev/ttyUSB0
      - WMS_CHANNEL=18
      - WMS_PAN_ID=FFFF
      - WMS_LOG_LEVEL=info

  web:
    build:
      context: .
      target: dev
    command: npx tsx watch packages/web/src/index.ts
    ports:
      - "3000:3000"
    volumes:
      - /dev:/dev
      - .:/app
      - node_modules:/app/node_modules

volumes:
  node_modules:
